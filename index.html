<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sofía & Javier Wedding</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Cormorant+Garamond:wght@300;400;500&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap');

:root{
--paper:#F8F3EA;
--paper-light:#FCF8F1;
--gold:#B99555;
--gold-dark:#977238;
--ink:#473C33;
--muted:#7B6F64;
--line:rgba(185,149,85,.34);
--leaf:#8F9274;
}

*{
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
margin:0;
background:var(--paper);
color:var(--ink);
font-family:"Montserrat",sans-serif;
text-align:center;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
z-index:-2;
pointer-events:none;
background:
linear-gradient(rgba(248,243,234,.96),rgba(248,243,234,.96)),
repeating-linear-gradient(
45deg,
rgba(130,110,80,.04) 0px,
rgba(130,110,80,.04) 1px,
transparent 1px,
transparent 7px
);
}

button,
.btn{
appearance:none;
display:inline-block;
text-decoration:none;
font-family:"Montserrat",sans-serif;
font-size:10px;
font-weight:300;
letter-spacing:.22em;
text-transform:uppercase;
padding:13px 34px;
background:rgba(252,248,241,.44);
border:1px solid rgba(185,149,85,.75);
color:var(--gold-dark);
cursor:pointer;
transition:.28s ease;
}

button:hover,
.btn:hover{
background:var(--gold);
border-color:var(--gold);
color:#fff;
}

p{
font-size:13px;
font-weight:300;
line-height:1.85;
letter-spacing:.02em;
color:#5A5048;
margin:0 0 18px;
}

h1,
h2,
h3{
font-family:"Playfair Display",serif;
font-weight:400;
color:var(--gold-dark);
}

h2{
font-size:clamp(32px,5vw,56px);
letter-spacing:.06em;
margin:0 0 18px;
}

h3{
font-size:clamp(25px,3.3vw,35px);
letter-spacing:.13em;
text-transform:uppercase;
margin:0 0 18px;
}

.kicker{
font-size:10px;
font-weight:300;
letter-spacing:.28em;
text-transform:uppercase;
color:var(--gold-dark);
margin-bottom:16px;
}

.script-title{
font-family:"Great Vibes",cursive;
font-size:clamp(54px,7vw,92px);
font-weight:400;
color:#5F554D;
line-height:.95;
}

.gold-rule{
width:120px;
height:1px;
margin:26px auto;
background:var(--line);
}

.gold-rule.small{
width:72px;
margin:14px auto 28px;
}

.section{
position:relative;
overflow:hidden;
border-bottom:1px solid rgba(185,149,85,.20);
background:rgba(248,243,234,.86);
}

.panel{
position:relative;
z-index:2;
}

/* FLORES */

.floral{
position:absolute;
width:360px;
height:360px;
pointer-events:none;
z-index:1;
opacity:.82;
background:
radial-gradient(circle at 50% 44%, rgba(255,255,255,.98) 0 8%, transparent 9%),
radial-gradient(circle at 37% 52%, rgba(255,255,255,.93) 0 13%, transparent 14%),
radial-gradient(circle at 62% 52%, rgba(255,255,255,.90) 0 13%, transparent 14%),
radial-gradient(circle at 50% 67%, rgba(255,255,255,.84) 0 15%, transparent 16%),
radial-gradient(circle at 68% 32%, rgba(143,146,116,.30) 0 5%, transparent 6%),
radial-gradient(circle at 76% 45%, rgba(143,146,116,.24) 0 6%, transparent 7%),
radial-gradient(circle at 34% 75%, rgba(143,146,116,.20) 0 5%, transparent 6%),
radial-gradient(circle at 52% 52%, rgba(185,149,85,.16), transparent 38%);
filter:drop-shadow(0 14px 32px rgba(80,60,30,.06));
}

.floral::before,
.floral::after{
content:"";
position:absolute;
width:220px;
height:1px;
background:linear-gradient(90deg, transparent, rgba(185,149,85,.42), transparent);
top:52%;
left:50%;
transform:translate(-50%,-50%) rotate(-28deg);
}

.floral::after{
transform:translate(-50%,-50%) rotate(28deg);
}

.floral.top-right{
top:-88px;
right:-66px;
}

.floral.bottom-left{
left:-92px;
bottom:-88px;
transform:rotate(180deg);
}

.floral.bottom-right{
right:-92px;
bottom:-88px;
transform:rotate(170deg);
}

.floral.top-left{
left:-90px;
top:-88px;
transform:rotate(-15deg);
}

.floral.small{
width:220px;
height:220px;
opacity:.45;
}

/* BOTONES FIJOS */

.music-toggle,
.language-toggle{
position:fixed;
top:28px;
z-index:100;
width:76px;
height:76px;
border-radius:50%;
padding:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(252,248,241,.80);
border:1px solid rgba(185,149,85,.34);
box-shadow:0 10px 30px rgba(80,60,30,.08);
backdrop-filter:blur(5px);
font-size:9px;
letter-spacing:.12em;
line-height:1.25;
}

.music-toggle{
left:28px;
}

.language-toggle{
right:28px;
}

.music-toggle span:first-child{
font-size:22px;
line-height:1;
margin-bottom:5px;
}

.language-toggle span:first-child{
font-family:"Playfair Display",serif;
font-size:14px;
}

/* PORTADA */

.opening{
position:fixed;
inset:0;
z-index:70;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at 80% 12%, rgba(255,255,255,.52), transparent 30%),
radial-gradient(circle at 15% 76%, rgba(255,255,255,.46), transparent 34%),
var(--paper);
overflow:hidden;
}

.opening.hide{
animation:openingOut 1.15s ease forwards;
}

@keyframes openingOut{
to{
opacity:0;
visibility:hidden;
transform:scale(1.025);
filter:blur(3px);
}
}

.opening-inner{
position:relative;
z-index:2;
width:min(860px,88vw);
}

.monogram-frame{
position:relative;
width:186px;
height:186px;
margin:0 auto 46px;
border:1px solid rgba(185,149,85,.46);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.monogram-frame::before{
content:"";
position:absolute;
inset:14px;
border:1px solid rgba(185,149,85,.20);
border-radius:50%;
}

.monogram-frame::after{
content:"";
position:absolute;
inset:-18px;
border-radius:50%;
background:
radial-gradient(circle at 50% 0%, rgba(185,149,85,.45) 0 3px, transparent 4px),
radial-gradient(circle at 8% 52%, rgba(185,149,85,.35) 0 3px, transparent 4px),
radial-gradient(circle at 92% 52%, rgba(185,149,85,.35) 0 3px, transparent 4px),
linear-gradient(45deg, transparent 42%, rgba(185,149,85,.26) 43%, transparent 45%),
linear-gradient(135deg, transparent 42%, rgba(185,149,85,.20) 43%, transparent 45%);
opacity:.50;
}

.monogram{
font-family:"Playfair Display",serif;
font-size:64px;
line-height:.82;
color:#A57D3C;
position:relative;
z-index:2;
}

.monogram small{
display:block;
font-size:30px;
}

.opening h1{
font-size:clamp(44px,7vw,82px);
letter-spacing:.30em;
margin:0;
color:#A57D3C;
}

.opening .script{
font-family:"Great Vibes",cursive;
font-size:clamp(34px,5vw,58px);
line-height:1;
color:#6E6258;
margin:18px 0 10px;
}

.opening .date{
font-size:12px;
letter-spacing:.36em;
line-height:2.15;
text-transform:uppercase;
color:#4A4038;
}

.opening .scroll-mark{
font-family:"Playfair Display",serif;
font-size:32px;
color:#9F7A3A;
margin-top:38px;
}

.monogram-frame,
.opening h1,
.opening .script,
.opening .date,
.opening button,
.opening .gold-rule,
.opening .scroll-mark{
opacity:0;
animation:stagedFadeUp 1.05s ease forwards;
}

.monogram-frame{animation-delay:.20s;}
.opening h1{animation-delay:.72s;}
.opening .script{animation-delay:1.04s;}
.opening .gold-rule:nth-of-type(1){animation-delay:1.28s;}
.opening .date{animation-delay:1.48s;}
.opening .gold-rule:nth-of-type(2){animation-delay:1.70s;}
.opening button{animation-delay:1.94s;}
.opening .scroll-mark{animation-delay:2.15s;}

@keyframes stagedFadeUp{
from{
opacity:0;
transform:translateY(18px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* TRANSICIÓN CARTA */

.letter-transition{
display:none;
position:fixed;
inset:0;
z-index:65;
background:var(--paper);
perspective:1600px;
overflow:hidden;
align-items:center;
justify-content:center;
}

.letter-transition.show{
display:flex;
}

.letter-left,
.letter-right{
position:absolute;
top:0;
width:50%;
height:100%;
background:linear-gradient(rgba(252,248,241,.97),rgba(248,243,234,.98));
box-shadow:0 0 45px rgba(80,60,30,.08);
transition:transform 1.45s ease;
}

.letter-left{
left:0;
transform-origin:left center;
border-right:1px solid rgba(185,149,85,.34);
}

.letter-right{
right:0;
transform-origin:right center;
border-left:1px solid rgba(185,149,85,.34);
}

.letter-transition.open .letter-left{
transform:rotateY(-112deg);
}

.letter-transition.open .letter-right{
transform:rotateY(112deg);
}

.letter-center{
position:relative;
z-index:2;
transition:opacity .7s ease;
}

.letter-transition.open .letter-center{
opacity:0;
}

.letter-mark{
font-family:"Playfair Display",serif;
font-size:clamp(48px,8vw,86px);
letter-spacing:.12em;
color:#A57D3C;
}

/* MAIN */

main{
opacity:0;
pointer-events:none;
}

main.visible{
opacity:1;
pointer-events:auto;
animation:mainIn .9s ease both;
}

@key frames mainIn{
from{opacity:0;}
to{opacity:1;}
}

/* CARD REVEAL */

.reveal-panel{
position:relative;
overflow:hidden;
opacity:0;
transform:perspective(1200px) rotateX(4deg) translateY(34px);
transform-origin:top center;
transition:opacity .8s ease, transform 1s ease;
}

.reveal-panel.panel-visible{
opacity:1;
transform:perspective(1200px) rotateX(0deg) translateY(0);
}

.panel-fold{
position:absolute;
top:0;
height:100%;
width:50%;
z-index:12;
pointer-events:none;
background:linear-gradient(rgba(252,248,241,.98),rgba(248,243,234,.98));
box-shadow:0 0 36px rgba(80,60,30,.08);
backface-visibility:hidden;
transition:transform 1.25s ease, opacity .45s ease 1s;
}

.panel-fold-left{
left:0;
transform-origin:left center;
border-right:1px solid rgba(185,149,85,.32);
}

.panel-fold-right{
right:0;
transform-origin:right center;
border-left:1px solid rgba(185,149,85,.32);
}

.panel-fold::before{
content:"";
position:absolute;
inset:20px;
border:1px solid rgba(185,149,85,.18);
}

.reveal-panel.panel-visible .panel-fold-left{
transform:rotateY(-112deg);
opacity:0;
}

.reveal-panel.panel-visible .panel-fold-right{
transform:rotateY(112deg);
opacity:0;
}

/* BIENVENIDA */

.welcome{
min-height:520px;
display:flex;
align-items:center;
justify-content:center;
padding:88px 22px;
}

.paper-card{
width:min(760px,100%);
position:relative;
z-index:2;
background:rgba(252,248,241,.74);
border:1px solid rgba(185,149,85,.28);
padding:clamp(44px,6vw,76px);
box-shadow:0 12px 34px rgba(80,60,30,.05);
}

.paper-card::before,
.paper-card::after{
content:"";
position:absolute;
width:52px;
height:52px;
opacity:.38;
}

.paper-card::before{
top:18px;
left:18px;
border-top:1px solid rgba(185,149,85,.68);
border-left:1px solid rgba(185,149,85,.68);
}

.paper-card::after{
right:18px;
bottom:18px;
border-right:1px solid rgba(185,149,85,.68);
border-bottom:1px solid rgba(185,149,85,.68);
}

.welcome h2{
letter-spacing:.10em;
text-transform:uppercase;
}

.welcome .copy{
max-width:520px;
margin:0 auto;
}

/* CUENTA */

.count-section{
min-height:410px;
padding:70px 22px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(252,248,241,.72);
}

.count-card{
position:relative;
z-index:2;
width:min(760px,100%);
}

.countdown{
display:flex;
justify-content:center;
align-items:flex-start;
gap:clamp(14px,4vw,42px);
flex-wrap:wrap;
margin:26px 0;
}

.countdown strong{
display:block;
font-family:"Playfair Display",serif;
font-size:clamp(38px,6vw,60px);
font-weight:400;
color:#A57D3C;
}

.countdown span{
display:block;
font-size:10px;
letter-spacing:.22em;
text-transform:uppercase;
color:#5D5249;
}

.count-separator{
font-family:"Playfair Display",serif;
font-size:46px;
line-height:1.15;
color:#A57D3C;
}

/* CELEBRACIONES */

.celebrations{
min-height:720px;
padding:88px 5vw 104px;
display:flex;
align-items:center;
justify-content:center;
}

.celebrations-wrap{
position:relative;
z-index:2;
width:min(1120px,100%);
}

.celebration-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:34px;
margin-top:34px;
}

.event-card{
min-height:360px;
display:grid;
grid-template-columns:52% 48%;
background:#FCF8F1;
border:1px solid rgba(185,149,85,.30);
box-shadow:0 14px 34px rgba(80,60,30,.08);
overflow:hidden;
}

.event-art{
position:relative;
min-height:360px;
background:#F1EAE0;
}

.event-art img{
width:100%;
height:100%;
display:block;
object-fit:cover;
filter:grayscale(20%) sepia(10%) brightness(1.10) contrast(.92);
}

.event-art::after{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(90deg, rgba(252,248,241,.10), rgba(252,248,241,.58)),
radial-gradient(circle at 35% 62%, transparent 0 42%, rgba(252,248,241,.55) 62%);
mix-blend-mode:screen;
}

.event-copy{
position:relative;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:36px 26px;
}

.event-copy .place{
font-size:10px;
letter-spacing:.30em;
text-transform:uppercase;
color:#5D5249;
margin-bottom:18px;
}

.event-copy .date-small{
font-family:"Playfair Display",serif;
font-size:18px;
letter-spacing:.22em;
color:#4A4038;
margin-bottom:34px;
}

/* DETALLE */

.detail{
min-height:560px;
padding:0;
}

.detail-card{
width:100%;
display:grid;
grid-template-columns:48% 52%;
min-height:560px;
background:#FCF8F1;
}

.detail-card.reverse{
grid-template-columns:52% 48%;
}

.detail-text{
display:flex;
flex-direction:column;
align-items:flex-start;
justify-content:center;
text-align:left;
padding:clamp(48px,7vw,88px);
}

.detail-text h2{
font-size:clamp(30px,4vw,48px);
letter-spacing:.06em;
text-transform:none;
}

.detail-ornament{
font-family:"Cormorant Garamond",serif;
font-size:26px;
color:#B99555;
margin:0 0 30px;
}

.detail-row{
display:grid;
grid-template-columns:34px 1fr;
gap:18px;
margin:15px 0;
font-size:12px;
line-height:1.72;
letter-spacing:.05em;
}

.detail-row strong{
font-weight:500;
color:#3F352E;
}

.detail-icon{
color:#9F7A3A;
font-size:20px;
line-height:1.4;
}

.detail-art{
position:relative;
min-height:560px;
background:#F1EAE0;
overflow:hidden;
}

.detail-art img{
width:100%;
height:100%;
display:block;
object-fit:cover;
filter:grayscale(10%) sepia(12%) brightness(1.07) contrast(.94);
}

.detail-art::after{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(ellipse at 48% 50%, transparent 0 54%, rgba(252,248,241,.62) 74%),
linear-gradient(rgba(252,248,241,.08),rgba(252,248,241,.24));
pointer-events:none;
}

.detail-art .floral{
right:-72px;
bottom:-86px;
z-index:2;
}

/* DRESS */

.dress{
min-height:520px;
padding:0;
}

.dress-card{
width:100%;
min-height:520px;
display:grid;
grid-template-columns:1fr 1fr;
background:#FCF8F1;
position:relative;
}

.dress-title{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:clamp(48px,7vw,90px);
}

.dress-title h2{
font-size:clamp(28px,4vw,42px);
letter-spacing:.16em;
text-transform:uppercase;
}

.dress-figures{
display:flex;
align-items:center;
justify-content:center;
gap:52px;
padding:60px 40px;
}

.dress-divider{
width:1px;
height:190px;
background:rgba(185,149,85,.28);
}

.dress-figure{
width:120px;
height:240px;
position:relative;
opacity:.78;
}

.dress-head{
width:24px;
height:24px;
border:1px solid rgba(80,70,62,.45);
border-radius:50%;
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
}

.dress-body{
width:44px;
height:62px;
border:1px solid rgba(80,70,62,.45);
border-bottom:none;
position:absolute;
top:34px;
left:50%;
transform:translateX(-50%);
border-radius:18px 18px 4px 4px;
}

.dress-skirt{
width:92px;
height:126px;
border:1px solid rgba(80,70,62,.45);
border-top:none;
position:absolute;
top:90px;
left:50%;
transform:translateX(-50%);
clip-path:polygon(38% 0, 62% 0, 100% 100%, 0 100%);
}

.suit-body{
width:62px;
height:112px;
border:1px solid rgba(80,70,62,.45);
position:absolute;
top:36px;
left:50%;
transform:translateX(-50%);
clip-path:polygon(18% 0, 82% 0, 100% 100%, 0 100%);
}

.suit-body::before{
content:"";
position:absolute;
left:50%;
top:0;
height:100%;
border-left:1px solid rgba(80,70,62,.35);
}

.suit-leg{
position:absolute;
top:146px;
width:28px;
height:82px;
border:1px solid rgba(80,70,62,.45);
}

.suit-leg.left{left:30px;}
.suit-leg.right{right:30px;}

/* Confirmación */

.rsvp{
min-height:620px;
padding:82px 22px;
display:flex;
align-items:center;
justify-content:center;
background:#FCF8F1;
}

.rsvp-card{
position:relative;
z-index:2;
width:min(760px,100%);
}

.rsvp-card h2{
font-size:clamp(32px,5vw,52px);
letter-spacing:.10em;
text-transform:uppercase;
}

.rsvp-intro{
font-family:"Cormorant Garamond",serif;
font-size:clamp(20px,3vw,28px);
line-height:1.55;
color:#5A5048;
}

.rsvp-events{
display:grid;
grid-template-columns:1fr 1fr;
border-top:1px solid rgba(185,149,85,.28);
border-bottom:1px solid rgba(185,149,85,.28);
margin:36px auto;
width:min(700px,100%);
}

.rsvp-event{
padding:28px 22px;
border-right:1px solid rgba(185,149,85,.24);
}

.rsvp-event:last-child{
border-right:none;
}

.event-date{
font-family:"Playfair Display",serif;
font-size:22px;
letter-spacing:.16em;
color:#9F7A3A;
margin-bottom:12px;
}

.event-name,
.event-place{
font-size:10px;
letter-spacing:.22em;
text-transform:uppercase;
color:#4A4038;
margin-bottom:8px;
}

.event-place{
color:#7D7168;
}

/* INFO */

.info{
min-height:620px;
padding:86px 22px 96px;
display:flex;
align-items:center;
justify-content:center;
}

.info-wrap{
position:relative;
z-index:2;
width:min(900px,100%);
}

.info h2{
font-size:clamp(38px,5vw,58px);
margin-bottom:8px;
}

.info-subtitle{
font-size:11px;
letter-spacing:.18em;
text-transform:uppercase;
color:#7D7168;
margin-bottom:40px;
}

.travel-map{
width:min(720px,90%);
height:250px;
margin:0 auto 48px;
position:relative;
}

.map-line{
position:absolute;
left:20%;
right:20%;
top:50%;
height:1px;
background:rgba(185,149,85,.45);
transform:rotate(-10deg);
}

.map-line::before{
content:"";
position:absolute;
inset:-40px 20px;
border-top:1px dashed rgba(185,149,85,.35);
border-radius:50%;
transform:rotate(4deg);
}

.map-point{
position:absolute;
width:14px;
height:14px;
background:#B99555;
border-radius:50%;
box-shadow:0 0 0 7px rgba(185,149,85,.12);
}

.map-point span{
position:absolute;
top:24px;
left:50%;
transform:translateX(-50%);
white-space:nowrap;
font-size:10px;
letter-spacing:.18em;
text-transform:uppercase;
color:#4A4038;
}

.map-point.argentina{
left:18%;
top:64%;
}

const weddingDate =
new Date("2026-09-26T17:30:00");


function updateCountdown(){

const now =
new Date();

const diff =
weddingDate - now;

if(diff<=0){

document.getElementById("days").textContent = "0";
document.getElementById("hours").textContent = "0";
document.getElementById("minutes").textContent = "0";
document.getElementById("seconds").textContent = "0";

return;

}

const secondsTotal =
Math.floor(diff / 1000);

const days =
Math.floor(secondsTotal / (60 * 60 * 24));

const hours =
Math.floor((secondsTotal % (60 * 60 * 24)) / (60 * 60));

const minutes =
Math.floor((secondsTotal % (60 * 60)) / 60);

const seconds =
secondsTotal % 60;

document.getElementById("days").textContent = days;
document.getElementById("hours").textContent = hours;
document.getElementById("minutes").textContent = minutes;
document.getElementById("seconds").textContent = seconds;

}


updateCountdown();

setInterval(updateCountdown,1000);

let panelsStarted =
false;


function startPanelObserver(){

if(panelsStarted){

return;

}

panelsStarted =
true;

const revealPanels =
document.querySelectorAll(
".paper-card, .event-card, .detail-card, .rsvp-card, .info-wrap, .final .panel"
);

revealPanels.forEach(function(panel){

panel
.classList
.add("reveal-panel");

if(!panel.querySelector(".panel-fold-left")){

const leftFold =
document.createElement("div");

leftFold
.classList
.add("panel-fold","panel-fold-left");

const rightFold =
document.createElement("div");

rightFold
.classList
.add("panel-fold","panel-fold-right");

panel
.appendChild(leftFold);

panel
.appendChild(rightFold);

}

});

const panelObserver =
new IntersectionObserver(function(entries){

entries.forEach(function(entry){

if(entry.isIntersecting){

entry
.target
.classList
.add("panel-visible");

}

});

},
{
threshold:.18
});

setTimeout(function(){

revealPanels.forEach(function(panel){

panelObserver
.observe(panel);

});

},120);

}


const navLinks =
document.querySelectorAll(".bottom-nav a");

const observedSections =
document.querySelectorAll(
"#celebraciones, #ceremonia, #recepcion, #dresscode, #info, #rsvp"
);

const navObserver =
new IntersectionObserver(function(entries){

entries.forEach(function(entry){

if(entry.isIntersecting){

const id =
entry.target.id;

navLinks.forEach(function(link){

link
.classList
.remove("active");

if(link.dataset.section === id){

link
.classList
.add("active");

}

});

}

});

},
{
threshold:0.45
});

observedSections.forEach(function(section){

navObserver
.observe(section);

});

</script>


<script>
(function(){

function abrirInvitacionFallback(){

var opening =
document.getElementById("opening");

var main =
document.getElementById("main");

var letterTransition =
document.getElementById("letterTransition");

if(opening){
opening.classList.add("hide");
opening.style.opacity = "0";
opening.style.visibility = "hidden";
opening.style.pointerEvents = "none";
}

if(letterTransition){
letterTransition.classList.remove("show");
letterTransition.classList.remove("open");
}

if(main){
main.classList.add("visible");
main.style.opacity = "1";
main.style.pointerEvents = "auto";
}

if(typeof startPanelObserver === "function"){
try{
startPanelObserver();
}
catch(error){}
}

window.scrollTo({
top:0,
behavior:"smooth"
});

}

function instalarClickSello(){

var boton =
document.querySelector(".seal-open");

if(!boton){
return;
}

boton.style.pointerEvents = "auto";
boton.style.zIndex = "99999";

boton.addEventListener("click",function(event){

event.preventDefault();
event.stopImmediatePropagation();

if(window.__selloAbierto){
return;
}

window.__selloAbierto = true;

try{

if(typeof window.enterInvitation === "function"){
window.enterInvitation();
}
else{
abrirInvitacionFallback();
}

}
catch(error){
abrirInvitacionFallback();
}

},true);

}

if(document.readyState === "loading"){

document.addEventListener("DOMContentLoaded",instalarClickSello);

}
else{

instalarClickSello();

}

})();
</script>
