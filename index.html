<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofía & Javier Wedding</title>
  
  <style>
    /* 1. FUENTES Y VARIABLES */
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Cinzel:wght@400;600&family=Allura&family=GFS+Didot&display=swap');

    :root { --gold: #A77C32; --gold-dark: #8F743B; --gold-text: #9A7636; --bg-color: #FFFDF8; }
    
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    /* 2. FONDO Y ESTILO GLOBAL */
    body {
      margin: 0;
      background-image: url('fondo-cuenta-regresiva.png');
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: var(--gold-dark);
      font-family: 'Cormorant Garamond', serif;
    }

    /* 3. ESTRUCTURA DE SECCIONES (TRANSPARENTES PARA EL FONDO) */
    .section { position: relative; padding: 80px 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent !important; }
    .content-wrapper { background: rgba(255, 253, 248, 0.5); padding: 40px 20px; border-radius: 10px; width: min(800px, 94vw); margin: 0 auto; z-index: 5; }

    /* 4. COMPONENTES */
    h2 { font-family: 'GFS Didot', serif; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; }
    .ramito { display: block; width: 95px; height: 24px; margin: 12px auto 24px auto; background: url("ramito-divisor.png") center/contain no-repeat; }
    .btn { appearance: none; cursor: pointer; padding: 14px 28px; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel', serif; text-transform: uppercase; font-size: 11px; }

    /* 5. GRID INFORMACIÓN ÚTIL */
    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; width: min(700px, 90vw); margin: 40px auto; border-top: 1px solid rgba(198,160,91,.3); border-bottom: 1px solid rgba(198,160,91,.3); padding: 30px 0; }
    .info-item { display: flex; flex-direction: column; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .info-icon { width: 38px; height: 38px; }
    .info-icon img { width: 100%; height: 100%; object-fit: contain; }
    .info-item span { font-family: 'Cinzel', serif; font-size: 8px; text-transform: uppercase; color: var(--gold-dark); }

    /* 6. MODALES Y TRANSICIONES */
    .modal-overlay { position: fixed; inset: 0; z-index: 200000; display: none; align-items: center; justify-content: center; background: rgba(255,253,248,.95); }
    .modal-overlay.show { display: flex; }
    .modal-sheet { background: white; padding: 40px; border: 1px solid var(--gold); position: relative; width: 90%; max-width: 500px; }
    #opening { position: fixed; inset: 0; z-index: 90000; background: var(--bg-color); display: flex; align-items: center; justify-content: center; transition: opacity 0.7s; }
    #opening.hide { opacity: 0; pointer-events: none; }
    #main { display: none; opacity: 0; transition: opacity 1s; }
    #main.visible { display: block; opacity: 1; }
  </style>
</head>
<body>

  <audio id="bgMusic" src="claro-de-luna.mp3" loop></audio>
  <button class="music-toggle" onclick="toggleMusic()" style="position:fixed; top:20px; left:20px; z-index:100000; border:none; background:transparent;">
    <img src="volumen-dorado.png" width="30">
  </button>

  <section id="opening">
    <div class="content-wrapper">
      <div style="font-family: 'GFS Didot'; font-size: 40px; color: var(--gold);">SOFÍA & JAVIER</div>
      <button class="btn" onclick="enterInvitation()">Abrir Invitación</button>
    </div>
  </section>

  <main id="main">
    <section id="bienvenidos" class="section">
      <div class="content-wrapper">
        <h2>Bienvenidos</h2>
        <div class="ramito"></div>
        <p>Los invitamos a celebrar nuestra boda.</p>
      </div>
    </section>

    <section id="info" class="section">
      <div class="content-wrapper">
        <h2>El viaje</h2>
        <div class="info-grid">
          <a href="https://maps.google.com" target="_blank" class="info-item"><div class="info-icon"><img src="icono-llegar.png"></div><span>Cómo llegar</span></a>
          <a href="https://www.google.com/search?q=hoteles+en+Morcote" target="_blank" class="info-item"><div class="info-icon"><img src="icono-hoteles.png"></div><span>Hoteles</span></a>
          <a href="https://www.google.com/flights" target="_blank" class="info-item"><div class="info-icon"><img src="icono-transporte.png"></div><span>Transporte</span></a>
          <a href="https://www.meteosvizzera.admin.ch" target="_blank" class="info-item"><div class="info-icon"><img src="icono-clima.png"></div><span>Clima</span></a>
          <a href="https://www.revolut.com" target="_blank" class="info-item"><div class="info-icon"><img src="icono-moneda.png"></div><span>Moneda</span></a>
          <div class="info-item" onclick="abrirModalIdioma()" style="cursor:pointer;"><div class="info-icon"><img src="icono-idioma.png"></div><span>Idiomas</span></div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="mainModal">
    <div class="modal-sheet">
      <button onclick="cerrarModal()" style="position:absolute; top:10px; right:10px;">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    function toggleMusic() { const audio = document.getElementById('bgMusic'); audio.paused ? audio.play() : audio.pause(); }
    function enterInvitation() { 
      document.getElementById('opening').classList.add('hide'); 
      document.getElementById('main').style.display = 'block';
      setTimeout(() => { document.getElementById('main').style.opacity = '1'; }, 100);
    }
    function abrirModal() { document.getElementById('mainModal').classList.add('show'); }
    function cerrarModal() { document.getElementById('mainModal').classList.remove('show'); }
    function abrirModalIdioma() { 
        document.getElementById('modalContent').innerHTML = "<h2>Idioma</h2><p>El idioma oficial es el Italiano.</p>"; 
        abrirModal(); 
    }
  </script>
</body>
</html>
