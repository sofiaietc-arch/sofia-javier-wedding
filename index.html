<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofia & Javier Wedding</title>
  
  <style>
    /* =========================================
       1. FUENTES Y VARIABLES
       ========================================= */
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Allura&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=GFS+Didot&display=swap');

    :root {
      --gold: #A77C32;
      --gold-dark: #6a4e1e; /* Color oscuro para mayor legibilidad */
      --text: #9A7636;
      --bg-color: #FFFDF8;
      --embossed: url("fondo-relieve.jpg");
      --metal: url("oro-metalizado.jpg");
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 15px; }

    body {
      margin: 0; background: var(--bg-color); color: var(--text);
      font-family: 'Cormorant Garamond', serif; text-align: center; overflow-x: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: -4; pointer-events: none;
      background-image: linear-gradient(rgba(255,253,248,.68), rgba(255,253,248,.82)), var(--embossed);
      background-size: cover; background-position: center;
    }

    h1, h2, h3, .countdown strong {
      font-family: 'GFS Didot', 'Bodoni Moda', serif; font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold); margin: 0;
    }

    p, label, input, textarea {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(16px, 2.2vw, 22px); line-height: 1.5; color: var(--gold-dark);
    }

    .cinzel, .btn, .nav-label, .date-small, .place {
      font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 0.15em;
    }

    .gold-gradient {
      background-image: linear-gradient(115deg, #7A5416, #C99430, #FFF1A8, #A9711E, #E8C15B, #7E5819, #D6A842), var(--metal);
      background-size: 220% 220%, cover; background-position: 35% 45%, center;
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .gold-rule { width: 120px; height: 1px; margin: 20px auto; background: rgba(198,160,91,.46); }
    .gold-rule.small { width: 72px; margin-bottom: 35px; }

    .ramito {
      display: block; width: 95px; height: 24px; margin: 12px auto 24px auto;
      background: url("ramito-divisor.png") center center / contain no-repeat;
    }

    button, .btn {
      appearance: none; display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 11px; padding: 12px 24px; cursor: pointer; transition: 0.3s ease;
      background: rgba(255,255,255,.64); border: 1px solid rgba(198,160,91,.86); color: var(--gold);
    }
    button:hover, .btn:hover { background: var(--gold); color: #fff; }

    /* =========================================
       4. PORTADA (OPENING)
       ========================================= */
    #opening { 
      position: fixed; inset: 0; z-index: 90000; overflow-y: auto; overflow-x: hidden; 
      background: var(--bg-color); display: flex; align-items: center; justify-content: center; 
      transition: opacity .7s ease, visibility .7s ease; 
    }
    #opening.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    #opening::before {
      content: ""; position: absolute; inset: 0; z-index: -1;
      background-image: linear-gradient(rgba(255,253,248,.64), rgba(255,253,248,.72)), var(--embossed);
      background-size: cover; background-position: center;
    }
    .opening-inner {
      position: relative; z-index: 10; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; width: 100%; min-height: 100%; padding: 40px 15px;
    }
    .floral-corner { position: absolute; width: 520px; height: 430px; background: url("flores-portada.png") no-repeat; background-size: contain; opacity: 0.72; z-index: 2; pointer-events: none; }
    .floral-tl { top: -55px; left: -70px; transform: rotate(180deg); }
    .floral-br { bottom: -55px; right: -70px; background-position: bottom right; }

    .portada-monograma { width: 250px; max-width: 65vw; margin: 0 auto 25px; position: relative; z-index: 10; mix-blend-mode: multiply; }
    
    /* FIX LEGIBILIDAD PORTADA */
    .portada-fechas { display: flex; flex-direction: column; gap: 18px; margin-bottom: 35px; position: relative; z-index: 10; text-align: center; }
    .fecha-bloque { display: flex; flex-direction: column; gap: 6px; }
    .fecha-dia { font-size: clamp(14px, 3vw, 18px); letter-spacing: 0.15em; font-weight: 700; color: #5c451b; }
    .fecha-lugar { font-size: clamp(13px, 2.5vw, 16px); letter-spacing: 0.28em; font-weight: 700; color: #5c451b; }
    .fecha-separador { font-size: 16px; margin: 0; color: #A77C32; font-weight: bold; }

    /* SELLO */
    button.seal-open {
      position: relative; display: flex; flex-direction: column; align-items: center; z-index: 80;
      background: transparent !important; border: none !important; padding: 0; margin: 0 auto; 
      cursor: pointer; outline: none !important; box-shadow: none !important;
      -webkit-tap-highlight-color: transparent;
    }
    button.seal-open img { width: 145px; mix-blend-mode: multiply; transition: transform 0.3s; filter: drop-shadow(0 8px 13px rgba(96,65,20,.12)); }
    button.seal-open:hover img { transform: scale(1.05); }
    button.seal-open span { font-size: 14px; letter-spacing: 0.3em; margin-top: 12px; text-transform: uppercase; color: var(--gold); font-weight: bold; }

    /* =========================================
       3D LETTER TRANSITION (AL HACER CLIC EN SELLO)
       ========================================= */
    .letter-transition {
      position: fixed; inset: 0; z-index: 120000; display: none; align-items: center; justify-content: center;
      perspective: 1800px; overflow: hidden;
      background: linear-gradient(rgba(255,253,248,.88), rgba(255,253,248,.96)), var(--embossed);
      background-size: cover; background-position: center;
      opacity: 0; transition: opacity 0.4s ease;
    }
    .letter-transition.show { display: flex; opacity: 1; pointer-events: auto; }
    .letter-left, .letter-right {
      position: absolute; top: 0; width: 50.5%; height: 100%;
      background: linear-gradient(135deg, rgba(255,255,255,.98), rgba(255,253,248,.94)), var(--embossed);
      background-size: cover; background-position: center;
      box-shadow: 0 0 46px rgba(80,60,30,.10);
      transition: transform 1.5s cubic-bezier(0.18, 0.72, 0.2, 1), opacity 0.5s ease 1s;
    }
    .letter-left { left: 0; transform-origin: left center; border-right: 1px solid rgba(198,160,91,.3); }
    .letter-right { right: 0; transform-origin: right center; border-left: 1px solid rgba(198,160,91,.3); }
    .letter-left::before, .letter-right::before { content: ""; position: absolute; inset: 24px; border: 1px solid rgba(198,160,91,.22); pointer-events: none; }
    .letter-center { position: relative; z-index: 10; transition: all 0.5s ease; text-align: center; }
    
    .letter-transition.open .letter-left { transform: rotateY(-116deg); opacity: 0; }
    .letter-transition.open .letter-right { transform: rotateY(116deg); opacity: 0; }
    .letter-transition.open .letter-center { opacity: 0; transform: scale(0.9); }

    /* =========================================
       MAIN CONTENT (EL CONTENIDO DEL SITIO)
       ========================================= */
    #main { display: none; opacity: 0; pointer-events: none; transition: opacity 1s ease; }
    #main.visible { display: block; opacity: 1; pointer-events: auto; }

    /* SECCIONES Y CARTAS GENERALES */
    .section { position: relative; padding: 80px 18px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .paper-card {
      width: min(760px, 94vw); background: rgba(255,255,255,.86); border: 1px solid rgba(198,160,91,.31);
      box-shadow: 0 14px 36px rgba(70,55,38,.045); backdrop-filter: blur(1.2px);
      padding: clamp(40px, 6vw, 70px) 20px; position: relative; z-index: 5;
    }
    .guirnalda-bg {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: min(720px, 96vw); height: 210px;
      background: url("flores-guirnalda.png") center top / contain no-repeat; opacity: 0.78; z-index: 1; pointer-events: none;
    }
    .guirnalda-bottom { top: auto; bottom: -10px; background-position: center bottom; }

    /* =========================================
       ANIMACIÓN DE CARTAS POR CADA SECCIÓN (SCROLL)
       ========================================= */
    .page-carta { position: relative; perspective: 1800px; overflow: hidden; }
    .page-carta > div.content-wrapper { opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease 0.5s, transform 0.8s ease 0.5s; position: relative; z-index: 10; }
    .page-carta.carta-abierta > div.content-wrapper { opacity: 1; transform: translateY(0); }
    .carta-fold {
      position: absolute; top: 0; width: 50.5%; height: 100%; z-index: 500;
      background: linear-gradient(rgba(255,255,255,.97), rgba(255,253,248,.95)), var(--embossed);
      background-size: cover; background-position: center;
      box-shadow: 0 0 34px rgba(80,60,30,.08); backface-visibility: hidden; pointer-events: none;
      transition: transform 1.3s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease 0.9s;
    }
    .carta-fold::before { content: ""; position: absolute; inset: 15px; border: 1px solid rgba(198,160,91,.2); }
    .carta-fold.left { left: 0; transform-origin: left center; border-right: 1px solid rgba(198,160,91,.3); }
    .carta-fold.right { right: 0; transform-origin: right center; border-left: 1px solid rgba(198,160,91,.3); }
    .carta-abierta .carta-fold.left { transform: rotateY(-110deg); opacity: 0; }
    .carta-abierta .carta-fold.right { transform: rotateY(110deg); opacity: 0; }

    /* =========================================
       ELEMENTOS INTERNOS
       ========================================= */
    /* CUENTA REGRESIVA */
    .countdown { display: flex; justify-content: center; gap: clamp(15px, 4vw, 30px); margin: 30px 0; }
    .countdown div { display: flex; flex-direction: column; }
    .countdown strong { font-size: clamp(32px, 5vw, 48px); }
    .countdown span { font-size: 10px; letter-spacing: 0.2em; margin-top: 5px; }

    /* CELEBRACIONES (VERTICAL) */
    .celebration-grid {
      display: grid; grid-template-columns: repeat(2, minmax(320px, 420px)); gap: 40px;
      justify-content: center; align-items: stretch; width: 100%; margin-top: 40px; z-index: 10; position: relative;
    }
    .event-card {
      display: flex; flex-direction: column; width: 100%; height: 520px; overflow: hidden;
      background: rgba(255,253,248,.94); border: 1px solid rgba(198,160,91,.34); box-shadow: 0 14px 34px rgba(70,55,38,.08);
    }
    .event-art { position: relative; width: 100%; height: 280px; flex: 0 0 280px; }
    .event-art img {
      width: 100%; height: 100%; object-fit: cover; object-position: center 30%;
      filter: grayscale(10%) sepia(8%) brightness(1.13) contrast(0.88);
      -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 55%, transparent 100%);
      mask-image: linear-gradient(to bottom, #000 0%, #000 55%, transparent 100%);
    }
    .event-copy { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; flex: 1; padding: 10px 30px 40px; text-align: center; }
    .event-copy h3 { font-size: clamp(26px, 3vw, 32px); letter-spacing: 0.20em; margin: 0 auto 12px auto; }
    .event-copy .date-small { font-size: clamp(24px, 2.5vw, 32px); font-weight: bold; margin-bottom: auto; }
    .event-copy .btn { margin-top: auto; }

    /* DRESS CODE */
    .dress-image-wrap img { width: min(340px, 80vw); object-fit: contain; mix-blend-mode: multiply; margin-top: 20px; }

    /* RSVP PAJAROS FIX - ENCUADRE DE BOTON TRANSAPARENTE */
    .rsvp-birds-container {
      position: relative; display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 480px; margin: 30px auto 0 auto; min-height: 120px;
    }
    .pajaros-frame {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 100%; height: auto; object-fit: contain; opacity: 0.9; pointer-events: none; z-index: 1;
    }
    .rsvp-birds-container .btn {
      position: relative; z-index: 2; padding: 14px 28px; font-size: 13px;
      background: transparent !important; box-shadow: none !important; border: 1px solid rgba(198, 160, 91, 0.8) !important;
    }

    /* MUSIC & NAV */
    .music-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 100000;
      background: rgba(255,253,248,.92); border: 1px solid rgba(198,160,91,.52); border-radius: 50%;
      width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 8px 24px rgba(80,60,30,.12);
    }
    .music-toggle img { width: 38px; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%; z-index: 150000;
      display: grid; grid-template-columns: repeat(6, 1fr);
      background: rgba(255,253,248,.98); border-top: 1px solid rgba(198,160,91,.38);
      backdrop-filter: blur(10px); padding-bottom: env(safe-area-inset-bottom);
      visibility: hidden; opacity: 0; transform: translateY(100%); transition: all 0.4s ease;
    }
    body.menu-visible .bottom-nav { visibility: visible; opacity: 1; transform: translateY(0); }
    body.menu-visible { padding-bottom: 70px; }

    .bottom-nav a {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 10px 0; text-decoration: none; border-right: 1px solid rgba(198,160,91,.2); color: var(--text);
    }
    .bottom-nav a:last-child { border: none; }
    .nav-icon { width: 26px; height: 26px; margin-bottom: 4px; display: flex; justify-content: center; align-items: center; }
    .nav-icon svg, .nav-icon svg * {
      width: 100%; height: 100%; fill: none !important; stroke: var(--gold) !important;
      stroke-width: 2.1 !important; stroke-linecap: round !important; stroke-linejoin: round !important;
    }
    .nav-label { font-family: 'Cinzel', serif; font-size: 7px; color: var(--gold-dark); text-transform: uppercase; text-align: center; white-space: normal; line-height: 1.15; }

    /* MODALES */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200000; display: none; align-items: center; justify-content: center;
      background: rgba(255,253,248,.95); backdrop-filter: blur(5px);
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      position: relative; width: min(900px, 95vw); max-height: 90vh; overflow-y: auto; text-align: left;
      background: linear-gradient(rgba(255,255,255,.94), rgba(255,253,248,.96)), var(--embossed);
      border: 1px solid rgba(198,160,91,.42); padding: 40px; box-shadow: 0 28px 70px rgba(80,60,30,.18);
      animation: pageTurn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: left center;
    }
