<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofía & Javier Wedding</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Cinzel:wght@400;600&family=Allura&family=GFS+Didot&display=swap');

    :root { --gold: #A77C32; --gold-dark: #8F743B; --bg-color: #FFFDF8; }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0; 
      background-image: url('fondo-cuenta-regresiva.png');
      background-size: cover; background-position: center; background-attachment: fixed;
      font-family: 'Cormorant Garamond', serif; color: var(--gold-dark); text-align: center;
    }

    /* SECCIONES Y TARJETAS */
    .section { position: relative; padding: 80px 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent !important; }
    .content-wrapper { background: rgba(255, 253, 248, 0.4); padding: 40px 20px; border-radius: 10px; width: min(800px, 94vw); z-index: 5; backdrop-filter: blur(5px); }
    
    /* TIPOGRAFÍA */
    h2 { font-family: 'GFS Didot', serif; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; }
    .cinzel { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 0.15em; }
    .ramito { display: block; width: 95px; height: 24px; margin: 12px auto 24px auto; background: url("ramito-divisor.png") center/contain no-repeat; }

    /* PORTADA */
    #opening { position: fixed; inset: 0; z-index: 90000; background: var(--bg-color); display: flex; align-items: center; justify-content: center; transition: opacity 0.7s; }
    #opening.hide { opacity: 0; pointer-events: none; }
    
    /* GRID INFO */
    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
    .info-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; color: inherit; }
    .info-icon { width: 38px; height: 38px; margin-bottom: 8px; }
    .info-icon img { width: 100%; height: 100%; object-fit: contain; }
    .info-item span { font-family: 'Cinzel', serif; font-size: 8px; text-transform: uppercase; }

    /* MODALES */
    .modal-overlay { position: fixed; inset: 0; z-index: 200000; display: none; align-items: center; justify-content: center; background: rgba(255,253,248,.95); }
    .modal-overlay.show { display: flex; }
    .modal-sheet { background: white; padding: 40px; border: 1px solid var(--gold); width: 90%; max-width: 500px; position: relative; }
    
    /* NAV BAR */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; display: grid; grid-template-columns: repeat(6, 1fr); background: rgba(255,253,248,.9); z-index: 1000; padding: 10px 0; }
  </style>
</head>
<body>

  <!-- AUDIO -->
  <audio id="bgMusic" src="claro-de-luna.mp3" loop></audio>
  <button onclick="toggleMusic()" style="position:fixed; top:20px; left:20px; z-index:1000; border:none; background:transparent;">🔊</button>

  <!-- PORTADA -->
  <section id="opening">
    <div class="content-wrapper">
      <h1>SOFÍA & JAVIER</h1>
      <button class="btn" onclick="enterInvitation()">Abrir Invitación</button>
    </div>
  </section>

  <!-- MAIN -->
  <main id="main" style="display: none; opacity: 0; transition: opacity 1s;">
    
    <!-- SECCIÓN INFO -->
    <section id="info" class="section">
      <div class="content-wrapper">
        <h2>El viaje</h2>
        <div class="ramito"></div>
        <div class="info-grid">
          <a href="https://maps.google.com" target="_blank" class="info-item"><div class="info-icon"><img src="icono-llegar.png"></div><span>Cómo llegar</span></a>
          <a href="https://www.google.com/search?q=hoteles+en+Morcote" target="_blank" class="info-item"><div class="info-icon"><img src="icono-hoteles.png"></div><span>Hoteles</span></a>
          <a href="https://www.google.com/flights" target="_blank" class="info-item"><div class="info-icon"><img src="icono-transporte.png"></div><span>Transporte</span></a>
          <a href="https://www.meteosvizzera.admin.ch" target="_blank" class="info-item"><div class="info-icon"><img src="icono-clima.png"></div><span>Clima</span></a>
          <a href="https://www.revolut.com" target="_blank" class="info-item"><div class="info-icon"><img src="icono-moneda.png"></div><span>Moneda</span></a>
          <div class="info-item" onclick="abrirModalIdioma()"><div class="info-icon"><img src="icono-idioma.png"></div><span>Idiomas</span></div>
        </div>
      </div>
    </section>

    <!-- RSVP -->
    <section id="rsvp" class="section">
        <div class="content-wrapper">
            <h2>Confirmación</h2>
            <form onsubmit="enviarRsvp(event)">
                <input type="text" id="nombre" placeholder="Nombre" required style="width:100%; margin-bottom:10px;">
                <button type="submit" class="btn">Enviar</button>
            </form>
        </div>
    </section>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="mainModal">
    <div class="modal-sheet">
      <button onclick="cerrarModal()" style="position:absolute; top:10px; right:10px;">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    function toggleMusic() { const audio = document.getElementById('bgMusic'); audio.paused ? audio.play() : audio.pause(); }
    
    function enterInvitation() { 
      document.getElementById('opening').classList.add('hide'); 
      const main = document.getElementById('main');
      main.style.display = 'block';
      setTimeout(() => { main.style.opacity = '1'; }, 100);
    }
    
    function abrirModalIdioma() { 
        document.getElementById('modalContent').innerHTML = "<h2>Idioma</h2><p>En Morcote, el idioma oficial es el <strong>Italiano</strong>.</p><button onclick='cerrarModal()'>Cerrar</button>"; 
        document.getElementById('mainModal').classList.add('show');
    }
    
    function cerrarModal() { document.getElementById('mainModal').classList.remove('show'); }
    
    function enviarRsvp(e) { e.preventDefault(); alert("Enviado"); }
  </script>
</body>
</html>
