<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sofía & Javier Wedding</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@300;400&display=swap');

body {
    margin: 0;
    background: #F8F3EA;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #3A332B;
    text-align: center;
    overflow: hidden;
}

.invitation {
    animation: fadeIn 2.5s ease;
}

.initials {
    font-family: "Playfair Display", serif;
    font-size: 38px;
    letter-spacing: 8px;
    color: #C9A45C;
    margin-bottom: 35px;
}

h1 {
    font-family: "Playfair Display", serif;
    font-size: 55px;
    font-weight: 400;
    margin: 0;
}

.wedding {
    font-family: "Montserrat", sans-serif;
    font-size: 14px;
    letter-spacing: 8px;
    margin-top: 18px;
    color: #7A8060;
}

.line {
    width: 80px;
    height: 1px;
    background: #C9A45C;
    margin: 35px auto;
}

button {
    margin-top: 45px;
    padding: 15px 45px;
    background: transparent;
    border: 1px solid #C9A45C;
    color: #C9A45C;
    border-radius: 30px;
    font-family: "Montserrat", sans-serif;
    letter-spacing: 2px;
    cursor: pointer;
    font-size: 13px;
}

button:hover {
    background:#C9A45C;
    color:white;
}

@keyframes fadeIn {
    from {
        opacity:0;
        transform:translateY(20px);
    }
    to {
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="invitation">

<div class="initials">
S & J
</div>

<h1>
Sofía & Javier
</h1>

<div class="wedding">
WEDDING
</div>

<div class="line"></div>
<a href="#invitation">
<button>
View Invitation
</button>
</a>
<section id="invitation">

<h2>

Together with our families,

</h2>

<p>

we joyfully invite you to celebrate

the beginning of our forever

</p>

<h1>

Sofía & Javier

</h1>

<p>

26 September 2026

</p>

<p>

Chiesa Maria del Sasso<br>

Morcote, Switzerland

</p>

</section>
</div>

</body>
</html>
