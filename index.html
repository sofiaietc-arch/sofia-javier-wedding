<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sofía & Javier Wedding</title>

<style>
.ornament {
    color:#C9A45C;
    font-size:24px;
    margin-top:35px;
}

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@300;400&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #F8F3EA;
    height: 100vh;
    color: #3A332B;
    text-align: center;
    overflow: hidden;
}

.page {
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:absolute;
    transition:1.2s ease;
}

/* PORTADA */

.cover {
    background:#F8F3EA;
    z-index:2;
}

.cover.open {
    transform:translateY(-100%);
    opacity:0;
}


.initials {
    font-family:"Playfair Display", serif;
    font-size:38px;
    letter-spacing:8px;
    color:#C9A45C;
    margin-bottom:35px;
}

h1 {
    font-family:"Playfair Display", serif;
    font-size:55px;
    font-weight:400;
    margin:0;
}

.wedding {
    font-family:"Montserrat", sans-serif;
    font-size:14px;
    letter-spacing:8px;
    margin-top:18px;
    color:#7A8060;
}

.line {
    width:80px;
    height:1px;
    background:#C9A45C;
    margin:35px auto;
}

button {
    padding:15px 45px;
    background:transparent;
    border:1px solid #C9A45C;
    color:#C9A45C;
    border-radius:30px;
    font-family:"Montserrat", sans-serif;
    letter-spacing:2px;
    cursor:pointer;
}


/* INTERIOR */

.inside {
    background:#F8F3EA;
    padding:40px;
}

.card {
   
    background:#FBF7F0;
    border:1px solid #C9A45C;
    padding:60px 35px;
    max-width:450px;
    width:90%;
    box-shadow:0 20px 50px rgba(80,60,30,0.12);
    position:relative;
    animation:appear 2s ease;

}

.card h2 {
    font-family:"Playfair Display", serif;
    font-weight:400;
    font-size:24px;
}

.card p {
    font-family:"Montserrat", sans-serif;
    font-weight:300;
    line-height:1.8;
}

.card h1 {
    margin:35px 0;
}


@keyframes appear {
    from {
        opacity:0;
        transform:scale(.9);
    }
    to {
        opacity:1;
        transform:scale(1);
    }
}
.envelope {
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:3;
    perspective:1200px;
}

.left-page,
.right-page {
    position:absolute;
    width:50%;
    height:100%;
    top:0;
    background:#F8F3EA;
    transition:1.6s ease;
     box-shadow:0 0 40px rgba(80,60,30,0.08);
}

.left-page {
    left:0;
    transform-origin:left center;
    border-right:1px solid #C9A45C;
}

.right-page {
    right:0;
    transform-origin:right center;
    border-left:1px solid #C9A45C;
}


.open .left-page {
    transform:rotateY(-105deg);
}

.open .right-page {
    transform:rotateY(105deg);
}


.center-content {
    position:relative;
    z-index:5;
    transition:0.8s ease;
}


.open .center-content {
    opacity:0;
}

.card::before,
.card::after {
    content:"";
    position:absolute;
    width:45px;
    height:45px;
    border-color:#C9A45C;
    opacity:0.5;
}

.card::before {
    top:15px;
    left:15px;
    border-top:1px solid #C9A45C;
    border-left:1px solid #C9A45C;
}

.card::after {
    bottom:15px;
    right:15px;
    border-bottom:1px solid #C9A45C;
    border-right:1px solid #C9A45C;
}
</style>

</head>


<body>


<div class="envelope" id="envelope">
  <div class="left-page"></div>

<div class="center-content">

    <div class="initials">S & J</div>

    <h1>Sofía & Javier</h1>

    <div class="wedding">

      WEDDING

    </div>

    <div class="line"></div>

    <button onclick="openInvitation()">

      View Invitation

    </button>

  </div>

  <div class="right-page"></div>

</div>



<div class="page inside">

<div class="card">

<h2>
Together with our families,
</h2>

<p>
we joyfully invite you to celebrate
<br>
the beginning of our forever
</p>


<h1>
Sofía & Javier
</h1>


<p>
26 September 2026
</p>

<p>
Chiesa Maria del Sasso
<br>
Morcote, Switzerland
</p>

<div class="ornament">
✦
</div>

</div>

</div>

<script>

function openInvitation(){
document.getElementById("envelope").classList.add("open");
}

</script>


</body>
</html>
