<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofía & Javier Wedding</title>
  
  <style>
    /* RESET Y FUENTES */
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Cinzel:wght@400;600&family=Allura&family=GFS+Didot&display=swap');
    :root { --gold: #A77C32; --gold-dark: #8F743B; --gold-text: #9A7636; --bg-color: #FFFDF8; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Cormorant Garamond', serif; background-image: url('fondo-cuenta-regresiva.png'); background-size: cover; background-position: center; background-attachment: fixed; color: var(--gold-dark); text-align: center; }

    /* SECCIONES */
    .section { position: relative; padding: 80px 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent !important; }
    .content-wrapper { background: rgba(255, 253, 248, 0.4); padding: 40px 20px; border-radius: 10px; width: min(800px, 94vw); z-index: 5; }
    
    /* PORTADA */
    #opening { position: fixed; inset: 0; z-index: 90000; background: var(--bg-color); display: flex; align-items: center; justify-content: center; transition: opacity 0.7s; }
    #opening.hide { opacity: 0; pointer-events: none; }
    #opening::before { content: ""; position: absolute; inset: 0; z-index: -1; background: linear-gradient(rgba(255,253,248,.64), rgba(255,253,248,.72)), url('fondo portada.png'); background-size: cover; }

    /* ELEMENTOS UI */
    .btn { appearance: none; cursor: pointer; padding: 14px 28px; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel', serif; text-transform: uppercase; }
    h2 { font-family: 'GFS Didot', serif; color: var(--gold); text-transform: uppercase; }
    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin: 40px auto; padding: 30px 0; border-top: 1px solid rgba(198,160,91,.3); border-bottom: 1px solid rgba(198,160,91,.3); }
    .info-item { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; color: inherit; }
    .info-icon { width: 38px; height: 38px; }
    .info-icon img { width: 100%; height: 100%; object-fit: contain; }
    
    /* MODALES */
    .modal-overlay { position: fixed; inset: 0; z-index: 200000; display: none; align-items: center; justify-content: center; background: rgba(255,253,248,.95); }
    .modal-overlay.show { display: flex; }
    .modal-sheet { background: white; padding: 40px; border: 1px solid var(--gold); position: relative; width: 90%; max-width: 500px; }
  </style>
</head>
<body>

  <section id="opening">
    <div class="content-wrapper">
      <div class="portada-nombres" style="font-family: 'GFS Didot'; font-size: 40px;">SOFÍA & JAVIER</div>
      <button class="btn" onclick="enterInvitation()">Abrir Invitación</button>
    </div>
  </section>

  <main id="main" style="display: none; opacity: 0; transition: opacity 1s;">
    
    <section id="info" class="section">
      <div class="content-wrapper">
        <h2>El viaje</h2>
        <div class="info-grid">
          <a href="#" class="info-item"><div class="info-icon"><img src="icono-llegar.png"></div><span>Cómo llegar</span></a>
          <a href="#" class="info-item"><div class="info-icon"><img src="icono-hoteles.png"></div><span>Hoteles</span></a>
          <a href="#" class="info-item"><div class="info-icon"><img src="icono-transporte.png"></div><span>Transporte</span></a>
          <a href="#" class="info-item"><div class="info-icon"><img src="icono-clima.png"></div><span>Clima</span></a>
          <a href="#" class="info-item"><div class="info-icon"><img src="icono-moneda.png"></div><span>Moneda</span></a>
          <div class="info-item" onclick="abrirModalIdioma()"><div class="info-icon"><img src="icono-idioma.png"></div><span>Idiomas</span></div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="mainModal">
    <div class="modal-sheet">
      <button onclick="cerrarModal()" style="position:absolute; top:10px; right:10px;">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    function enterInvitation() { 
      document.getElementById('opening').classList.add('hide'); 
      document.getElementById('main').style.display = 'block';
      setTimeout(() => { document.getElementById('main').style.opacity = '1'; }, 100);
    }
    function abrirModal() { document.getElementById('mainModal').classList.add('show'); }
    function cerrarModal() { document.getElementById('mainModal').classList.remove('show'); }
    function abrirModalIdioma() { 
        document.getElementById('modalContent').innerHTML = "<h2>Idioma</h2><p>Italiano</p>"; 
        abrirModal(); 
    }
  </script>
</body>
</html>
