<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sofía & Javier Wedding</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@300;400&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #F8F3EA;
    height: 100vh;
    color: #3A332B;
    text-align: center;
    overflow: hidden;
}

.page {
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:absolute;
    transition:1.2s ease;
}

/* PORTADA */

.cover {
    background:#F8F3EA;
    z-index:2;
}

.cover.open {
    transform:translateY(-100%);
    opacity:0;
}


.initials {
    font-family:"Playfair Display", serif;
    font-size:38px;
    letter-spacing:8px;
    color:#C9A45C;
    margin-bottom:35px;
}

h1 {
    font-family:"Playfair Display", serif;
    font-size:55px;
    font-weight:400;
    margin:0;
}

.wedding {
    font-family:"Montserrat", sans-serif;
    font-size:14px;
    letter-spacing:8px;
    margin-top:18px;
    color:#7A8060;
}

.line {
    width:80px;
    height:1px;
    background:#C9A45C;
    margin:35px auto;
}

button {
    padding:15px 45px;
    background:transparent;
    border:1px solid #C9A45C;
    color:#C9A45C;
    border-radius:30px;
    font-family:"Montserrat", sans-serif;
    letter-spacing:2px;
    cursor:pointer;
}


/* INTERIOR */

.inside {
    background:#F8F3EA;
    padding:40px;
}

.card {
    border:1px solid #C9A45C;
    padding:60px 35px;
    max-width:450px;
    width:90%;
    animation:appear 2s ease;
}

.card h2 {
    font-family:"Playfair Display", serif;
    font-weight:400;
    font-size:24px;
}

.card p {
    font-family:"Montserrat", sans-serif;
    font-weight:300;
    line-height:1.8;
}

.card h1 {
    margin:35px 0;
}


@keyframes appear {
    from {
        opacity:0;
        transform:scale(.9);
    }
    to {
        opacity:1;
        transform:scale(1);
    }
}


</style>

</head>


<body>


<div class="envelope" id="envelope">
  <div class="left-page"></div>

<div class="center-content">

    <div class="initials">S & J</div>

    <h1>Sofía & Javier</h1>

    <div class="wedding">

      WEDDING

    </div>

    <div class="line"></div>

    <button onclick="openInvitation()">

      View Invitation

    </button>

  </div>

  <div class="right-page"></div>

</div>



<div class="page inside">

<div class="card">

<h2>
Together with our families,
</h2>

<p>
we joyfully invite you to celebrate
<br>
the beginning of our forever
</p>


<h1>
Sofía & Javier
</h1>


<p>
26 September 2026
</p>

<p>
Chiesa Maria del Sasso
<br>
Morcote, Switzerland
</p>


</div>

</div>



<script>

function openInvitation(){
document.getElementById("cover").classList.add("open");
}

</script>


</body>
</html>
